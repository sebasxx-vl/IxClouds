<div class="sales-container">
  <div class="header"><h1>Ventas</h1><button mat-raised-button color="primary" (click)="openSaleForm()"><mat-icon>add_shopping_cart</mat-icon> Nueva Venta</button></div>
  <mat-form-field appearance="outline" class="search-field"><mat-label>Buscar por ID</mat-label><input matInput [(ngModel)]="searchTerm" (ngModelChange)="applyFilters()"><mat-icon matSuffix>search</mat-icon></mat-form-field>
  <div *ngIf="loading" class="loading-spinner"><mat-spinner diameter="50"></mat-spinner></div>
  <div *ngIf="!loading && filteredSales.length === 0" class="no-data"><mat-icon>receipt</mat-icon><p>No hay ventas registradas</p></div>
  <table mat-table [dataSource]="filteredSales" *ngIf="!loading && filteredSales.length > 0">
    <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>ID</th><td mat-cell *matCellDef="let s">{{ s.id }}</td></ng-container>
    <ng-container matColumnDef="date"><th mat-header-cell *matHeaderCellDef>Fecha</th><td mat-cell *matCellDef="let s">{{ formatDate(s.date) }}</td></ng-container>
    <ng-container matColumnDef="total"><th mat-header-cell *matHeaderCellDef>Total</th><td mat-cell *matCellDef="let s">{{ s.total | currency:"COP":"symbol":"1.0-0" }}</td></ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Acciones</th><td mat-cell *matCellDef="let s"><button mat-icon-button color="primary"><mat-icon>visibility</mat-icon></button></td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
