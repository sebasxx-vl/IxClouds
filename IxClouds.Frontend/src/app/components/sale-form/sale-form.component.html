<h2 mat-dialog-title>Nueva Venta</h2>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <div formArrayName="items">
      <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="sale-item">
        <mat-form-field appearance="outline" class="product-select">
          <mat-label>Producto</mat-label>
          <mat-select formControlName="productId">
            <mat-option *ngFor="let p of products" [value]="p.id">
              {{ p.name }} - {{ p.price | currency:"COP":"symbol":"1.0-0" }} (Stock: {{ p.stockQuantity }})
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="quantity-input">
          <mat-label>Cantidad</mat-label>
          <input matInput type="number" formControlName="quantity" min="1">
        </mat-form-field>
        <button mat-icon-button color="warn" type="button" (click)="removeItem(i)" *ngIf="items.length > 1">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
    <button mat-button type="button" (click)="addItem()"><mat-icon>add</mat-icon> Agregar Producto</button>
    <div class="total-section"><strong>Total: {{ getSubtotal() | currency:"COP":"symbol":"1.0-0" }}</strong></div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancelar</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-spinner *ngIf="submitting" diameter="20"></mat-spinner>
      <span *ngIf="!submitting">Registrar Venta</span>
    </button>
  </mat-dialog-actions>
</form>
