<h2 mat-dialog-title>{{ isEdit ? "Editar Producto" : "Nuevo Producto" }}</h2>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <div class="form-grid">
      <mat-form-field appearance="outline">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="name">
        <mat-error *ngIf="form.get('name')?.hasError('required')">Requerido</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>SKU</mat-label>
        <input matInput formControlName="sku">
        <mat-error *ngIf="form.get('sku')?.hasError('required')">Requerido</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Categoría</mat-label>
        <input matInput formControlName="category">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Descripción</mat-label>
        <input matInput formControlName="description">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Stock</mat-label>
        <input matInput type="number" formControlName="stockQuantity">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Stock Mínimo</mat-label>
        <input matInput type="number" formControlName="minStockLevel">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Costo</mat-label>
        <span matPrefix>$&nbsp;</span>
        <input matInput type="number" formControlName="cost">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Precio Venta</mat-label>
        <span matPrefix>$&nbsp;</span>
        <input matInput type="number" formControlName="price">
        <mat-error *ngIf="form.get('price')?.hasError('required')">Requerido</mat-error>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>URL de Imagen</mat-label>
        <input matInput formControlName="imageUrl">
      </mat-form-field>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancelar</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
      <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
      <span *ngIf="!loading">{{ isEdit ? "Actualizar" : "Crear" }}</span>
    </button>
  </mat-dialog-actions>
</form>
